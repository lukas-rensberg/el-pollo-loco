<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>El pollo loco</h1>

    <img src="img/5_background/screen-bg.png" id="backgroundImage" alt="fullscreen background image showing a desert">
    <div id="gameContainer">
        <canvas width="720" height="480" id="gameCanvas">
            Your Browser does not support the HTML5 canvas tag.
        </canvas>

        <div id="startScreen">
            <img src="img/9_intro_outro_screens/start/startscreen_1.png" alt="Start Screen showing a preview of the game with background, enemies and player">
            <button id="startButton" onclick="startGame()">Start Game</button>
        </div>

        <div id="gameOverScreen" class="d-none">
            <img src="img/9_intro_outro_screens/game_over/you lost.png" alt="Game Over">
            <button id="restartButton" onclick="restartGame()">Restart</button>
        </div>
    </div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
